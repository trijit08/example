name: Build Node
on: [push,workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install Node
      uses: actions/setup-node@v6.4.0
      with:
         node-version: 16
    - name: Install Dependencies
      run:  npm ci
    - name: Run lint
      run: npm run lint
    - name: Run Build
      run: npm run build
    - name: Run test
      run: npm run test

